name: Checkmarx AST Scan

on:
  workflow_dispatch:

jobs:
  checkmarx-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkmarx AST Scan
        uses: checkmarx/ast-github-action@1fe318de2993222574e6249750ba9000a4e2a6cd

        with:
          base_uri: https://ind.ast.checkmarx.net/
          cx_tenant: cdac
          cx_client_id: additinal_params
          cx_client_secret: ZzZOQEwkPdMdnZI9JHAwlfEoJgyV1McN
          project_name: github_repo_addparam

          additional_params: >
            --scan-types sast
            --report-format json
            --output-path ./cx-results
